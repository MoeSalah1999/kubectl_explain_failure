[tox]
envlist = format,lint,typing,test
isolated_build = true

[testenv]
deps =
    .[dev]
commands = python -V

[testenv:format]
description = Run formatting checks
commands =
    python -m black --check kubectl_explain_failure
    python -m isort --check-only kubectl_explain_failure

[testenv:format-fix]
description = Auto-format codebase (black + isort)
commands =
    python -m black kubectl_explain_failure
    python -m isort kubectl_explain_failure

[testenv:lint]
description = Run static linting
commands =
    python -m ruff check kubectl_explain_failure

[testenv:lint-fix]
description = Auto-fix lint issues (ruff)
commands =
    python -m ruff check --fix kubectl_explain_failure

[testenv:typing]
description = Run mypy type checks
commands =
    python -m mypy kubectl_explain_failure

[testenv:test]
description = Run pytest suite with per-test progress
commands =
    python -m pytest -q

